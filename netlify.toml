# Next.js on Netlify – API routes and SSR require the Next.js plugin
# https://docs.netlify.com/frameworks/next-js/overview/
#
# Publish directory `.next` matches Netlify’s Next starter and overrides stray UI values.
# See: https://github.com/netlify-templates/next-platform-starter/blob/main/netlify.toml

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--include=dev"
  # Avoid OOM during `next build` on smaller Netlify build runners
  NODE_OPTIONS = "--max-old-space-size=4096"

# Required so API routes, SSR, and serverless functions run (booking, auth, DB)
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Scheduled no-show job: schedule is set in netlify/functions/no-show-checker.ts (export const config).
# Cron is hourly UTC; the function exits unless America/New_York is 23:59 (11:59 PM Eastern, DST-safe).
[functions]
  directory = "netlify/functions"
