# Next.js on Netlify – API routes and SSR require the Next.js plugin
# https://docs.netlify.com/build/frameworks/framework-setup-guides/nextjs/

[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--include=dev"

# Required so API routes, SSR, and serverless functions run (booking, auth, DB)
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Scheduled no-show job: schedule is set in netlify/functions/no-show-checker.ts (export const config).
# Cron is hourly UTC; the function exits unless America/New_York is 23:59 (11:59 PM Eastern, DST-safe).
[functions]
  directory = "netlify/functions"
