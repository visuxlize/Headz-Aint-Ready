# Next.js on Netlify – API routes and SSR require the Next.js plugin
# https://docs.netlify.com/build/frameworks/framework-setup-guides/nextjs/

[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--include=dev"

# Required so API routes, SSR, and serverless functions run (booking, auth, DB)
[[plugins]]
  package = "@netlify/plugin-nextjs"

# No-show job: cron is UTC-only; we use hourly "59 * * * *" and gate on America/New_York 23:59
# in no-show-checker.ts so it runs exactly 11:59 PM Eastern every calendar night (DST-safe).
[functions]
  directory = "netlify/functions"

[[functions]]
  name = "no-show-checker"
  schedule = "59 * * * *"
